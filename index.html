<!DOCTYPE html>
<html>
<head>
  <title>AgileSync Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>AgileSync Dashboard</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Sprint Progress</h2>
    <p>Stories Completed: 12</p>
    <p>Stories Remaining: 8</p>
  </div>

  <div class="card">
    <h2>Blockers</h2>
    <ul>
      <li>Database access pending</li>
      <li>API authentication issue</li>
    </ul>
  </div>

  <div class="card">
    <h2>Daily Standup Update</h2>

    <textarea id="updateText" placeholder="Enter today's update"></textarea>

    <button onclick="submitUpdate()">Submit Update</button>

    <h3>Submitted Updates</h3>
    <ul id="updatesList"></ul>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
